<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f7f5"/>
      <stop offset="100%" stop-color="#efece6"/>
    </linearGradient>
    <radialGradient id="accent" cx="80%" cy="20%">
      <stop offset="0%" stop-color="#c4756a" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#c4756a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#1a1518" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#accent)"/>

  <!-- Logo "ESPACIO 1010" -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="120" height="34" fill="#9e4e42"/>
    <text x="60" y="22" text-anchor="middle" font-family="Josefin Sans, sans-serif" font-size="13" font-weight="700" fill="#f8f7f5" letter-spacing="3">ESPACIO</text>
  </g>

  <!-- Titular -->
  <text x="80" y="320" font-family="Cormorant Garamond, serif" font-size="92" font-weight="500" fill="#1a1518">
    Tu consultorio,
  </text>
  <text x="80" y="420" font-family="Cormorant Garamond, serif" font-size="92" font-style="italic" font-weight="500" fill="#9e4e42">
    sin complicaciones.
  </text>

  <!-- Subtitle -->
  <text x="80" y="490" font-family="Josefin Sans, sans-serif" font-size="24" fill="#565153">
    Espacios boutique por hora · Cordón, Montevideo
  </text>

  <!-- Número 1010 grande -->
  <text x="1120" y="540" text-anchor="end" font-family="Cormorant Garamond, serif" font-size="280" font-weight="500" fill="#9e4e42" fill-opacity="0.15">
    1010
  </text>

  <!-- URL -->
  <text x="80" y="580" font-family="Josefin Sans, sans-serif" font-size="16" font-weight="600" fill="#9e4e42" letter-spacing="2">
    WWW.ESPACIO1010.UY
  </text>
</svg>
